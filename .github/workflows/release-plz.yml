# THIS FILE IS MANAGED BY AETHERIS CI STANDARDS (PORTED FROM PROTOCOL)
# DO NOT EDIT MANUALLY WITHOUT SYNCHRONIZING ACROSS ARCHITECTURE REPOS

name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          path: aetheris-client

      - name: Checkout protocol
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: garnizeh-labs/aetheris-protocol
          path: aetheris-protocol
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aetheris-client/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('aetheris-client/**/Cargo.lock') }}-1.95.0
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('aetheris-client/**/Cargo.lock') }}
            ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # 1.95.0
        with:
          toolchain: 1.95.0

      - name: Install protoc
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler

      - name: Setup Robust Cargo Environment (fix historical path dependencies)
        run: |
          # 1. Capture the exact protocol commit for deterministic resolution
          PROTOCOL_SHA=$(git -C "$GITHUB_WORKSPACE/aetheris-protocol" rev-parse HEAD)

          # 2. Setup Global Git-based Patches (pinned to checked-out commit)
          mkdir -p ~/.cargo
          cat <<EOF > ~/.cargo/config.toml
          [patch.crates-io]
          aetheris-protocol = { git = "https://github.com/garnizeh-labs/aetheris-protocol", rev = "${PROTOCOL_SHA}" }
          aetheris-encoder-serde = { git = "https://github.com/garnizeh-labs/aetheris-protocol", rev = "${PROTOCOL_SHA}" }
          aetheris-encoder-bitpack = { git = "https://github.com/garnizeh-labs/aetheris-protocol", rev = "${PROTOCOL_SHA}" }
          EOF

          # 3. Create Cargo Wrapper to sanitize manifests on-the-fly
          #    Placed in ~/.local/bin (before ~/.cargo/bin in PATH) so it
          #    delegates to rustup's proxy and honors the selected toolchain.
          mkdir -p ~/.local/bin
          cat <<'EOF' > ~/.local/bin/cargo
          #!/bin/bash
          # Detect if we are in a manifest context and strip broken relative paths
          if [[ "$*" == *"metadata"* ]] || [[ "$*" == *"package"* ]] || [[ "$*" == *"check"* ]]; then
            find . -maxdepth 4 -name "Cargo.toml" -exec sed -i 's/path = "\.\.\/aetheris-protocol"//g' {} +
            find . -maxdepth 4 -name "Cargo.toml" -exec sed -i 's/path = "\.\.\/\.\.\/aetheris-protocol"//g' {} +
          fi
          exec "$HOME/.cargo/bin/cargo" "$@"
          EOF
          chmod +x ~/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run release-plz
        uses: release-plz/action@49c995b2442b0f60dd4aab07a164cc00643471fc # v0.5.128
        with:
          project_manifest: aetheris-client/Cargo.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
